<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMTVPT iframe no reload</title>
<style>
html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#player {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
}

.stream-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
}
</style>
</head>
<body>

<div id="player">
    <iframe
        id="streamFrame"
        class="stream-frame"
        src="https://popcdn.day/player.php?stream=CMTVPT"
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
        allowfullscreen
        referrerpolicy="no-referrer">
    </iframe>
</div>

</body>
</html>
